menu_configs:
  - path: /overview
    enable: true
    sidebar_key: OVERVIEW
  - path: /topology
    enable: true
    sidebar_key: TOPOLOGY
  - path: /metrics
    enable: true
    sidebar_key: METRICS
  - path: /multicloud-resource-manage
    enable: true
    sidebar_key: MULTICLOUD-RESOURCE-MANAGE
    children:
      - path: namespace
        enable: true
        sidebar_key: NAMESPACE
      - path: workload
        enable: true
        sidebar_key: WORKLOAD
      - path: service
        enable: true
        sidebar_key: SERVICE
      - path: config
        enable: true
        sidebar_key: CONFIG
  - path: /multicloud-policy-manage
    enable: true
    sidebar_key: MULTICLOUD-POLICY-MANAGE
    children:
      - path: propagation-policy
        enable: true
        sidebar_key: PROPAGATION-POLICY
      - path: override-policy
        enable: true
        sidebar_key: OVERRIDE-POLICY
