apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: karmada-dashboard-cluster-proxy
rules:
  - apiGroups:
      - 'cluster.karmada.io'
    resources:
      - clusters/proxy
    # leave `resourceNames` empty for all member-clusters
    # or enumerate member-clusters in a list for better control
    # resourceNames:
    #  - 'member1'
    #  - 'member2'
    #  - 'member3'
    verbs:
      - '*'
  - apiGroups:
      - cluster.karmada.io
    resources:
      - clusters
    verbs:
      - list
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: karmada-dashboard-cluster-proxy
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: karmada-dashboard-cluster-proxy
subjects:
  - kind: ServiceAccount
    name: karmada-dashboard
    namespace: karmada-system
  - kind: Group
    name: "system:serviceaccounts"
  - kind: Group
    name: "system:serviceaccounts:default"
  - kind: Group
    name: "system:serviceaccounts:karmada-system"
