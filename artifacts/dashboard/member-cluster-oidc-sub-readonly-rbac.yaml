apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dashboard-member-readonly
rules:
  - apiGroups: [""]
    resources: ["namespaces", "nodes", "pods", "services", "configmaps", "events", "persistentvolumes", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "daemonsets", "statefulsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dashboard-member-readonly-oidc-user
subjects:
  - kind: User
    # Replace with the actual OIDC subject from token:
    # kubectl --token=<id_token> ... auth whoami
    name: oidc:<replace-with-sub>
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: dashboard-member-readonly
  apiGroup: rbac.authorization.k8s.io
